<template>
  <div class="dashboard">

    <div class="header">
      <div class="logo">
        影刃而解 AI数字孪生平台
      </div>

      <div class="menu">
        <span>首页</span>
        <span>影像中心</span>
        <span>AI分析</span>
        <span>三维重建</span>
        <span>数字孪生</span>
        <span>AR/VR</span>
        <span>报告中心</span>
      </div>
    </div>

    <div class="content">

      <div class="left-panel">

        <div class="card">
          <h3>患者数据</h3>

          <div class="number">
            12,568
          </div>
        </div>

        <div class="card">
          <h3>CT数据</h3>
          <div class="number">
            89,541
          </div>
        </div>

        <div class="card">
          <h3>MRI数据</h3>
          <div class="number">
            45,285
          </div>
        </div>

      </div>

      <div class="center-panel">

        <div id="threeContainer"></div>

      </div>

      <div class="right-panel">

        <div class="card">
          <h3>AI分析结果</h3>

          <el-progress
            :percentage="98"
            color="#00ffff"
          />
        </div>

        <div class="card">
          <h3>重建成功率</h3>

          <el-progress
            :percentage="97"
            color="#00ff99"
          />
        </div>

      </div>

    </div>

  </div>
</template>

<script setup>
import { onMounted } from "vue"
import * as THREE from "three"

onMounted(() => {

  const scene = new THREE.Scene()

  const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
  )

  const renderer = new THREE.WebGLRenderer()

  renderer.setSize(900,600)

  document
    .getElementById("threeContainer")
    .appendChild(renderer.domElement)

  const geometry =
    new THREE.TorusKnotGeometry()

  const material =
    new THREE.MeshStandardMaterial({
      color:"#00ffff"
    })

  const mesh =
    new THREE.Mesh(
      geometry,
      material
    )

  scene.add(mesh)

  const light =
    new THREE.PointLight(
      0xffffff,
      10
    )

  light.position.set(
    10,
    10,
    10
  )

  scene.add(light)

  camera.position.z=5

  function animate(){

    requestAnimationFrame(animate)

    mesh.rotation.x +=0.01
    mesh.rotation.y +=0.01

    renderer.render(
      scene,
      camera
    )
  }

  animate()
})
</script>
