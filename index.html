<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>颅影随形 - 全身三维重建与智能诊疗平台</title>
    <style>
        :root {
            --bg-dark: #0a1128;
            --bg-panel: #162447;
            --primary-cyan: #00e5ff;
            --text-light: #f1faee;
            --text-muted: #a8b2d1;
            --border-color: #1f4068;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* 顶部导航栏 */
        header {
            background-color: var(--bg-panel);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary-cyan);
            box-shadow: 0 4px 15px rgba(0, 229, 255, 0.2);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-cyan);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-links span {
            margin-left: 20px;
            color: var(--text-light);
            cursor: pointer;
            transition: color 0.3s;
        }

        .nav-links span:hover, .nav-links span.active {
            color: var(--primary-cyan);
        }

        /* 主体内容区 */
        .main-container {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
        }

        /* 左侧工作流菜单 */
        .sidebar {
            width: 250px;
            background-color: var(--bg-panel);
            border-radius: 10px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }

        .step-item {
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            background-color: rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
        }

        .step-item:hover, .step-item.active {
            background-color: rgba(0, 229, 255, 0.1);
            border-left: 4px solid var(--primary-cyan);
            transform: translateX(5px);
        }

        /* 中间核心操作区 */
        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .viewer-area {
            flex: 1;
            background-color: #000;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: radial-gradient(circle, #1f4068 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .mock-3d-model {
            width: 300px;
            height: 300px;
            border: 2px dashed var(--primary-cyan);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--primary-cyan);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(0, 229, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0); }
        }

        /* 右侧分析报告区 */
        .analysis-panel {
            width: 350px;
            background-color: var(--bg-panel);
            border-radius: 10px;
            padding: 20px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .data-card {
            background-color: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid var(--primary-cyan);
        }

        .data-card h3 {
            font-size: 1rem;
            margin-bottom: 10px;
            color: var(--text-muted);
        }

        .data-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
        }

        button.action-btn {
            background-color: var(--primary-cyan);
            color: var(--bg-dark);
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-top: auto;
            transition: background 0.3s;
        }

        button.action-btn:hover {
            background-color: #00b8cc;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            ☤ 颅影随形
            <span style="font-size: 0.9rem; color: var(--text-muted); font-weight: normal; margin-left: 10px;">
                AI驱动全身体三维重建与疾病诊疗交互系统
            </span>
        </div>
        <div class="nav-links">
            <span class="active">临床工作台</span>
            <span>影像管理库</span>
            <span>沉浸式教学(VR/AR)</span>
            <span>系统设置</span>
        </div>
    </header>

    <div class="main-container">
        
        <aside class="sidebar">
            <h3 style="margin-bottom: 20px; color: var(--text-muted);">标准诊疗流程</h3>
            <div class="step-item active" onclick="changeStep(1)">
                1. 多模态影像导入 (CT/MRI)
            </div>
            <div class="step-item" onclick="changeStep(2)">
                2. AI 全身病灶智能分割
            </div>
            <div class="step-item" onclick="changeStep(3)">
                3. 全身体三维重建与重塑
            </div>
            <div class="step-item" onclick="changeStep(4)">
                4. 疾病跨器官关联分析
            </div>
            <div class="step-item" onclick="changeStep(5)">
                5. 沉浸式手术规划与导出
            </div>
        </aside>

        <main class="workspace">
            <div class="viewer-area">
                <div class="mock-3d-model" id="model-display">
                    等待导入多模态数据...
                </div>
                <div style="position: absolute; bottom: 20px; left: 20px; display: flex; gap: 10px;">
                    <span style="background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 5px; color: var(--primary-cyan); font-size: 0.8rem;">3D U-Net + CBAM 运行中</span>
                    <span style="background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 5px; color: var(--primary-cyan); font-size: 0.8rem;">FPGA 边缘加速开启</span>
                </div>
            </div>
        </main>

        <aside class="analysis-panel">
            <h3 style="color: var(--primary-cyan); border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">智能分析报告</h3>
            
            <div class="data-card">
                <h3>当前处理进度</h3>
                <div class="data-value" id="progress-val">0%</div>
            </div>

            <div class="data-card">
                <h3>全身病灶检测结果</h3>
                <div style="color: #ff4757; font-size: 0.9rem; margin-top: 5px;">* 待AI分割确认区域</div>
            </div>

            <div class="data-card">
                <h3>数字孪生匹配度</h3>
                <div class="data-value" style="color: #2ed573;">--</div>
            </div>

            <button class="action-btn" onclick="simulateProcess()">一键启动 AI 诊疗闭环</button>
        </aside>

    </div>

    <script>
        // 简单的交互逻辑模拟，用于答辩演示
        function changeStep(step) {
            const steps = document.querySelectorAll('.step-item');
            steps.forEach(s => s.classList.remove('active'));
            steps[step-1].classList.add('active');

            const modelDisplay = document.getElementById('model-display');
            
            switch(step) {
                case 1: modelDisplay.innerText = "读取 PACS/DICOM 数据..."; break;
                case 2: modelDisplay.innerText = "正在进行像素级勾画..."; break;
                case 3: modelDisplay.innerText = "全身体高精度重建中..."; break;
                case 4: modelDisplay.innerText = "生成良恶性与转移风险评估..."; break;
                case 5: modelDisplay.innerText = "进入沉浸式交互模式..."; break;
            }
        }

        function simulateProcess() {
            let progress = 0;
            const progressEl = document.getElementById('progress-val');
            const modelDisplay = document.getElementById('model-display');
            
            const interval = setInterval(() => {
                progress += 5;
                progressEl.innerText = progress + "%";
                
                if (progress === 20) changeStep(2);
                if (progress === 50) changeStep(3);
                if (progress === 80) changeStep(4);
                
                if(progress >= 100) {
                    clearInterval(interval);
                    progressEl.innerText = "100% (完成)";
                    modelDisplay.innerHTML = "<strong>全身数字孪生体已生成</strong><br><br>点击可进行空间旋转与切面分析";
                    document.querySelector('.data-card:nth-child(2) div').innerText = "共发现 2 处疑似关联病灶";
                    document.querySelector('.data-card:nth-child(3) .data-value').innerText = "98.7%";
                    changeStep(5);
                }
            }, 200);
        }
    </script>
</body>
</html>
